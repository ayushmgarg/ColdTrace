<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{ app_name }} — Sign In</title>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
<button class="btn-ghost btn-sm theme-toggle" onclick="toggleTheme()" style="position:fixed;top:1rem;right:1rem;z-index:100">☀️ Light</button>
<main class="auth-shell">
  <div class="auth-panel">
    <div class="auth-logo">❄</div>
    <h1 class="auth-title">{{ app_name }}</h1>
    <p class="auth-sub">{{ tagline }}</p>

    <div id="error-box" class="error-msg hidden"></div>

    <form class="auth-form" id="login-form">
      <div class="auth-field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="admin@coldtrace.local" required/>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-primary btn-wide" id="login-btn">Sign in</button>
    </form>

    <div class="demo-accounts">
      <p>Demo credentials</p>
      <div class="demo-cred">
        <div>Admin — <code>admin@coldtrace.local</code> / <code>Admin@123</code></div>
        <div>Manager — <code>manager@coldtrace.local</code> / <code>Manager@123</code></div>
        <div>Supervisor — <code>supervisor@coldtrace.local</code> / <code>Supervisor@123</code></div>
        <div>Field — <code>vaccinator@coldtrace.local</code> / <code>Vaccinator@123</code></div>
      </div>
    </div>
  </div>
</main>
<script src="/static/common.js"></script>
<script src="/static/login.js"></script>
</body>
</html>
